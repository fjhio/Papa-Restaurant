<!DOCTYPE html>
<html>
<head>
<title>Menu</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<h1>The Pizza Dine</h1>
<nav>
<a href="index.html">Home</a>
<a onclick="toggleCart()" style="cursor:pointer;">Cart</a>
</nav>
</header>

<section class="section">
<h2>Our Menu</h2>

<div class="cards">

<div class="card">
<h3>Margherita Pizza</h3>
<p>₹199</p>
<button class="cart-btn" onclick="addToCart('Margherita Pizza',199)">Add to Cart</button>
</div>

<div class="card">
<h3>Farmhouse Pizza</h3>
<p>₹299</p>
<button class="cart-btn" onclick="addToCart('Farmhouse Pizza',299)">Add to Cart</button>
</div>

<div class="card">
<img src="shake.jpg">
<h3>Caramel Shake</h3>
<p>₹179</p>
<button class="cart-btn" onclick="addToCart('Caramel Shake',179)">Add to Cart</button>
</div>

</div>
</section>

<div class="cart-panel" id="cartPanel">
<h2>Your Cart</h2>
<div id="cartItems"></div>
<h3>Total: ₹<span id="totalPrice">0</span></h3>
<button class="cart-btn" onclick="orderWhatsApp()">Order on WhatsApp</button>
</div>

<div class="whatsapp-btn" onclick="orderWhatsApp()">
🟢
</div>

<script src="script.js"></script>

</body>
</html>
